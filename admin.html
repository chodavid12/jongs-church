<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>관리자 — 종의교회</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="assets/favicon.png" type="image/png">

  <link rel="stylesheet" href="assets/fonts/pretendard/pretendardvariable-dynamic-subset.css">
  <link rel="stylesheet" href="css/style.css?v=94f664cf">
  <style>
    #auth-view { max-width: 360px; margin: calc(var(--header-h) + 80px) auto 0; padding: 0 var(--pad-x); }
    #auth-view input { width: 100%; padding: 12px 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--line-mid); font: inherit; font-size: 15px; }
    #auth-view .btn { width: 100%; justify-content: center; margin-top: 6px; }
    #auth-error { color: #c0392b; font-size: 13.5px; margin-top: 10px; }
    .publish-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--paper-tint); border: 1px solid var(--line-mid); border-radius: 14px;
      padding: 12px 16px; margin-bottom: 22px; position: sticky; top: 8px; z-index: 5; }
    .publish-bar.dirty { background: #fff8e6; border-color: #f4c430; }
    .publish-bar .pc { font-size: 14px; font-weight: 700; color: var(--ink-soft); }
    .publish-bar.dirty .pc { color: #8a6d12; }
    .publish-bar button:disabled { opacity: .45; cursor: default; }
    .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .stat { background: var(--paper-tint); border-radius: 14px; padding: 16px 18px; }
    .stat .n { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
    .stat .v { font-size: 30px; font-weight: 800; margin-top: 4px; letter-spacing: -.02em; }
    .dash-card { background: var(--paper-tint); border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; }
    .dash-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 12px; }
    .dash-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .dash-card ul { list-style: none; }
    .dash-card li { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--line-soft, #eee); }
    .dash-card li:last-child { border-bottom: 0; }
    .dash-card li .lbl { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-card li .cnt { font-weight: 700; color: var(--ink-soft); flex: none; }
    .bars { display: flex; align-items: flex-end; gap: 4px; height: 90px; }
    .bars .bar { flex: 1; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; opacity: .85; }
    .bars .bar span { display: block; }
    .barlabels { display: flex; gap: 4px; margin-top: 6px; }
    .barlabels span { flex: 1; text-align: center; font-size: 10px; color: var(--ink-faint); }
    .devbar { display: flex; height: 22px; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .devbar i { display: block; height: 100%; }
    .quick a { color: var(--accent-deep); font-weight: 700; margin-right: 10px; }
    .admin-shell { display: flex; min-height: 100vh; padding-top: var(--header-h); }
    .admin-sidebar { width: 236px; flex: none; background: var(--paper-tint); border-right: 1px solid var(--line-mid);
      padding: 20px 14px; display: flex; flex-direction: column; gap: 14px; position: sticky; top: var(--header-h);
      height: calc(100vh - var(--header-h)); box-sizing: border-box; }
    .side-brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; padding: 4px 8px; }
    .side-brand img { width: 22px; height: 22px; }
    .side-nav { display: flex; flex-direction: column; gap: 4px; }
    .side-item { display: block; width: 100%; text-align: left; background: none; border: 0; font: inherit; font-size: 15px;
      font-weight: 600; color: var(--ink); padding: 11px 12px; border-radius: 10px; cursor: pointer; text-decoration: none; }
    .side-item:hover { background: rgba(0,0,0,.05); }
    .side-item.active { background: var(--accent); color: #fff; }
    .side-foot { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
    .side-foot .publish-bar { flex-direction: column; align-items: stretch; gap: 8px; margin: 0; position: static; top: auto; text-align: center; }
    .side-foot .publish-bar button, .side-foot #logout-btn { width: 100%; justify-content: center; }
    .admin-main { flex: 1; min-width: 0; padding: 28px 32px 60px; max-width: 920px; }
    .admin-page-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
    @media (max-width: 640px) { .dash-grid { grid-template-columns: repeat(2, 1fr); } .dash-2col { grid-template-columns: 1fr; } }
    @media (max-width: 760px) {
      .admin-shell { flex-direction: column; }
      .admin-sidebar { width: auto; height: auto; position: static; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px; }
      .side-brand { width: 100%; }
      .side-nav { flex-direction: row; flex: 1; }
      .side-foot { margin: 0; flex-direction: row; align-items: center; }
      .side-foot .publish-bar { flex-direction: row; }
      .admin-main { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logotype" href="index.html"><img class="mark" src="assets/logo-mark.png" alt="종의교회 로고">종의교회 — 관리자</a>
  </div>
</header>

<main>
  <section id="auth-view">
    <h1 style="font-size:22px;font-weight:800;margin-bottom:18px;">관리자 로그인</h1>
    <input id="auth-email" type="email" placeholder="이메일" autocomplete="username">
    <input id="auth-password" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn btn-accent" id="login-btn">로그인</button>
    <p id="auth-error"></p>
  </section>

  <div id="app-view" class="admin-shell" style="display:none;">
    <aside class="admin-sidebar">
      <div class="side-brand"><img src="assets/logo-mark.png" alt="">관리자</div>
      <nav class="side-nav">
        <button class="side-item active" data-nav="dashboard">📊 대시보드</button>
        <a class="side-item" href="index.html?edit=1">✎ 사이트에서 직접 편집</a>
      </nav>
      <div class="side-foot">
        <div id="publish-bar" class="publish-bar">
          <span id="publish-count" class="pc">…</span>
          <button class="btn btn-accent" id="publish-btn" disabled>게시하기</button>
        </div>
        <button class="btn" id="logout-btn">로그아웃</button>
      </div>
    </aside>
    <main class="admin-main">
      <section id="dashboard-view">
        <h1 class="admin-page-title">대시보드</h1>
        <div id="dash-root"><p style="color:var(--ink-faint)">불러오는 중…</p></div>
      </section>
    </main>
  </div>
</main>

<script src="js/supabase-config.js?v=541fdf00"></script>
<script src="js/vendor/supabase.js"></script>
<script>
  const SUPABASE_URL = (window.SUPA && window.SUPA.URL) || "https://jqxhdajpehnwaewrfjld.supabase.co";
  const SUPABASE_ANON_KEY = (window.SUPA && window.SUPA.ANON_KEY) || "sb_publishable_aD4lD4JuNZWJrjFUVUpOLQ_0rc9r8dx";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const authView = document.getElementById("auth-view");
  const authError = document.getElementById("auth-error");
  const loginBtn = document.getElementById("login-btn");

  async function handleAuth(fn) {
    authError.textContent = "";
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const { error } = await fn({ email, password });
    if (error) authError.textContent = error.message;
  }

  loginBtn.addEventListener("click", () => handleAuth((c) => sb.auth.signInWithPassword(c)));
  document.getElementById("logout-btn").addEventListener("click", () => sb.auth.signOut());
  document.getElementById("publish-btn").addEventListener("click", doPublish);

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // 미게시 변경 개수 조회 → 게시 바 갱신
  async function refreshPublishBar() {
    const bar = document.getElementById("publish-bar");
    if (!bar) return;
    const { data } = await sb.from("site_settings").select("draft_value,published_value");
    const dirty = (data || []).filter((r) => r.draft_value !== r.published_value).length;
    const countEl = document.getElementById("publish-count");
    const btn = document.getElementById("publish-btn");
    if (dirty > 0) {
      bar.classList.add("dirty");
      countEl.textContent = "미게시 변경 " + dirty + "건";
      btn.disabled = false;
    } else {
      bar.classList.remove("dirty");
      countEl.textContent = "모든 변경이 게시됨";
      btn.disabled = true;
    }
  }

  async function doPublish() {
    const btn = document.getElementById("publish-btn");
    const countEl = document.getElementById("publish-count");
    btn.disabled = true;
    countEl.textContent = "게시 중…";
    const { error } = await sb.rpc("publish_settings");
    if (error) { countEl.textContent = "게시 오류: " + error.message; return; }
    await refreshPublishBar();
    countEl.textContent = "게시 완료 ✓ — 방문자에게 반영되었습니다";
  }

  const appView = document.getElementById("app-view");

  // ---- 대시보드 ----
  const PAGE_NAMES = { "/": "홈", "/about.html": "종의소개", "/worship.html": "종의예배", "/life.html": "종의생활", "/news.html": "종의소식" };
  function pageName(p) { return PAGE_NAMES[p] || p; }

  async function loadDashboard() {
    const root = document.getElementById("dash-root");
    let ov, daily, pages, refs, devs;
    try {
      [ov, daily, pages, refs, devs] = await Promise.all([
        sb.rpc("stats_overview"),
        sb.rpc("stats_daily", { days: 14 }),
        sb.rpc("stats_top_pages", { days: 30, lim: 8 }),
        sb.rpc("stats_referrers", { days: 30, lim: 8 }),
        sb.rpc("stats_devices", { days: 30 }),
      ]);
    } catch (e) { root.innerHTML = "통계를 불러오지 못했습니다."; return; }
    const o = (ov && ov.data) || { today: 0, d7: 0, d30: 0, total: 0 };
    const dailyRows = (daily && daily.data) || [];
    const maxV = Math.max(1, ...dailyRows.map((r) => Number(r.views)));
    const bars = dailyRows.map((r) => `<div class="bar" style="height:${Math.round((Number(r.views) / maxV) * 100)}%" title="${r.day}: ${r.views}"></div>`).join("");
    const labels = dailyRows.map((r, i) => (i % 2 === 0 ? `<span>${String(r.day).slice(5)}</span>` : "<span></span>")).join("");
    const pageLis = ((pages && pages.data) || []).map((r) => `<li><span class="lbl">${escapeHtml(pageName(r.path))}</span><span class="cnt">${r.views}</span></li>`).join("") || "<li>아직 데이터가 없습니다</li>";
    const refLis = ((refs && refs.data) || []).map((r) => { let h = r.referrer; try { if (h && h !== "(직접 방문)") h = new URL(h).hostname; } catch (e) {} return `<li><span class="lbl">${escapeHtml(h)}</span><span class="cnt">${r.views}</span></li>`; }).join("") || "<li>아직 데이터가 없습니다</li>";
    const devData = (devs && devs.data) || [];
    const devTotal = Math.max(1, devData.reduce((a, r) => a + Number(r.views), 0));
    const DEVC = { desktop: "#428cb9", mobile: "#f4c430", tablet: "#8fcdf0", "기타": "#d2d2d7" };
    const devBar = devData.map((r) => `<i style="width:${(Number(r.views) / devTotal) * 100}%;background:${DEVC[r.device] || "#aaa"}"></i>`).join("");
    const devLegend = devData.map((r) => `<span style="margin-right:12px;font-size:13px"><b style="color:${DEVC[r.device] || "#aaa"}">■</b> ${escapeHtml(r.device)} ${r.views}</span>`).join("");

    root.innerHTML =
      `<div class="dash-grid">
        <div class="stat"><div class="n">오늘 방문</div><div class="v">${o.today}</div></div>
        <div class="stat"><div class="n">최근 7일</div><div class="v">${o.d7}</div></div>
        <div class="stat"><div class="n">최근 30일</div><div class="v">${o.d30}</div></div>
        <div class="stat"><div class="n">누적</div><div class="v">${o.total}</div></div>
      </div>
      <div class="dash-card"><h3>최근 14일 방문 추이</h3><div class="bars">${bars}</div><div class="barlabels">${labels}</div></div>
      <div class="dash-2col">
        <div class="dash-card"><h3>인기 페이지 (30일)</h3><ul>${pageLis}</ul></div>
        <div class="dash-card"><h3>유입 경로 (30일)</h3><ul>${refLis}</ul></div>
      </div>
      <div class="dash-card"><h3>기기 (30일)</h3><div class="devbar">${devBar}</div><div>${devLegend || "아직 데이터가 없습니다"}</div></div>
      <div class="dash-card"><h3>사이트 정보</h3>
        <p style="margin-bottom:6px">최신 주보: <b id="i-bulletin">–</b></p>
        <p style="margin-bottom:12px">재정 최신 주차: <b id="i-finance">–</b></p>
        <div class="quick">바로 편집: <a href="index.html?edit=1">홈</a><a href="about.html?edit=1">종의소개</a><a href="worship.html?edit=1">종의예배</a><a href="life.html?edit=1">종의생활</a><a href="news.html?edit=1">종의소식</a></div>
      </div>`;

    fetch("bulletins.json?_=" + Date.now()).then((r) => r.json()).then((d) => { const it = (d.items || [])[0]; if (it) document.getElementById("i-bulletin").textContent = it.date + " (총 " + (d.count || 0) + "개)"; }).catch(() => {});
    fetch("finance.json?_=" + Date.now()).then((r) => r.json()).then((d) => { const w = (d.weeks || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1))[0]; if (w) document.getElementById("i-finance").textContent = w.date; }).catch(() => {});
  }

  sb.auth.onAuthStateChange((_event, session) => {
    if (session) {
      authView.style.display = "none";
      appView.style.display = "";
      loadDashboard();
      refreshPublishBar();
    } else {
      authView.style.display = "";
      appView.style.display = "none";
    }
  });
</script>
</body>
</html>
